services:
  activation-server:
    container_name: glitcho-activation-server
    build:
      context: ../..
      dockerfile: deploy/license-server/Dockerfile
    restart: unless-stopped
    environment:
      PORT: 8787
      HOST: 0.0.0.0
      LICENSE_PRIVATE_KEY_PEM_FILE: /data/license-private.pem
      LICENSE_KEY_STORE_FILE: /data/license-keys.json
      LICENSE_INCLUDE_DEFAULT_TEST_KEYS: "false"
      LICENSE_ALLOW_COMPAT_SIGNATURE: "false"
    ports:
      - "${LICENSE_SERVER_PORT:-8787}:8787"
    volumes:
      - ./data:/data:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8787/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s
